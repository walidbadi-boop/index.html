  { date:"2 يوليو",  label:"K(2) vs L(2)", t1:{gi:10,rank:1}, t2:{gi:11,rank:1} },
  // 3 يوليو
  { date:"3 يوليو",  label:"J(1) vs H(2)", t1:{gi:9,rank:0},  t2:{gi:7,rank:1} },
  { date:"3 يوليو",  label:"D(2) vs G(2)", t1:{gi:3,rank:1},  t2:{gi:6,rank:1} },
  { date:"3 يوليو",  label:"K(1) vs L(2)", t1:{gi:10,rank:0}, t2:{gi:11,rank:1} },
];

// ============================================================
// حالة التطبيق
// ============================================================
let scores, koScores;
let activeGroup=0, activeTab='standings', activePage='groups';

function initData(){
  try {
    const saved=localStorage.getItem(STORAGE_KEY);
    if(saved){
      const p=JSON.parse(saved);
      if(p&&p.scores&&p.scores.length===G.length){
        showSaveBar('✅ تم تحميل بياناتك المحفوظة',true,2500);
        return p;
      }
    }
  } catch(e){}
  return {
    scores: G.map(g=>g.matches.map(m=>({s1:m.s1,s2:m.s2}))),
    koScores: KO_TEMPLATE.map(()=>({s1:null,s2:null}))
  };
}

function saveData(){
  try {
    localStorage.setItem(STORAGE_KEY,JSON.stringify({scores,koScores}));
    showSaveBar('💾 تم الحفظ تلقائياً ✓',true,2000);
  } catch(e){ showSaveBar('⚠️ تعذّر الحفظ',false,3000); }
}

function showSaveBar(msg,ok,dur){
  const el=document.getElementById('saveBar');
  if(!el) return;
  el.textContent=msg; el.className='save-bar'+(ok?' ok':'');
  setTimeout(()=>{el.textContent='💾 يتم الحفظ تلقائياً في متصفحك';el.className='save-bar';},dur||2000);
}

// ============================================================
// حساب ترتيب مجموعة
// ============================================================
function calcStandings(gi){
  const g=G[gi];
  const st=g.teams.map(()=>({mp:0,w:0,d:0,l:0,gf:0,ga:0,pts:0}));
  g.matches.forEach((m,mi)=>{
    const s=scores[gi][mi];
    if(s.s1===null||s.s2===null) return;
    const s1=+s.s1,s2=+s.s2;
    st[m.t1].mp++;st[m.t2].mp++;
    st[m.t1].gf+=s1;st[m.t1].ga+=s2;
    st[m.t2].gf+=s2;st[m.t2].ga+=s1;
    if(s1>s2){st[m.t1].w++;st[m.t1].pts+=3;st[m.t2].l++;}
    else if(s1<s2){st[m.t2].w++;st[m.t2].pts+=3;st[m.t1].l++;}
    else{st[m.t1].d++;st[m.t1].pts++;st[m.t2].d++;st[m.t2].pts++;}
  });
  return g.teams
    .map((name,i)=>({name,...st[i]}))
    .sort((a,b)=>b.pts!==a.pts?b.pts-a.pts:(b.gf-b.ga)!==(a.gf-a.ga)?(b.gf-b.ga)-(a.gf-a.ga):b.gf-a.gf);
}

// ============================================================
// دالة مركزية: احصل على اسم الفريق من مصدر ديناميكي
// ============================================================
function resolveTeam(src){
  const sorted=calcStandings(src.gi);
  const team=sorted[src.rank];
  if(!team) return null; // مجموعة لم تُحسم بعد
  return { name:team.name, sub:`${src.rank===0?'1':(src.rank===1?'2':'3')}st ${G[src.gi].name}` };
}

function isGroupComplete(gi){
  return scores[gi].every(s=>s.s1!==null&&s.s2!==null);
}

function rankColor(r,complete){
  if(r<2) return '#00c853';
  if(r===2&&!complete) return '#ff6d00';
  return '#c62828';
}

// ============================================================
// Render المجموعات
// ============================================================
function renderButtons(){
  const sel=document.getElementById('groupSelector');
  sel.innerHTML='';
  G.forEach((g,i)=>{
    const btn=document.createElement('button');
    btn.className='grp-btn'+(i===activeGroup?' active':'');
    btn.textContent=g.name;
    btn.onclick=()=>{activeGroup=i;renderGroupContent();};
    sel.appendChild(btn);
  });
}

function renderStandings(){
  const sorted=calcStandings(activeGroup);
  const complete=isGroupComplete(activeGroup);
  let html=`<div class="tbl-header"><span>#</span><span>الفريق</span><span>لع</span><span>ف</span><span>ت</span><span>خ</span><span style="color:#ffd700">نق</span></div>`;
  sorted.forEach((t,rank)=>{
    const color=rankColor(rank,complete);
    html+=`<div class="tbl-row ${rank<2?'qualify':''}">
      <div class="rank-badge" style="background:${color};display:flex;align-items:center;justify-content:center;">${rank+1}</div>
      <div class="team-name">${t.name}</div>
      <div class="stat">${t.mp}</div><div class="stat">${t.w}</div>
      <div class="stat">${t.d}</div><div class="stat">${t.l}</div>
      <div class="pts-badge">${t.pts}</div>
    </div>`;
  });
  if(complete){
    html+=`<div class="legend"><span><span class="dot" style="background:#00c853"></span>متأهل</span><span><span class="dot" style="background:#c62828"></span>خارج</span><span style="color:#445577;font-style:italic;">✓ مكتملة</span></div>`;
  } else {
    html+=`<div class="legend"><span><span class="dot" style="background:#00c853"></span>متأهل</span><span><span class="dot" style="background:#ff6d00"></span>محتمل</span><span><span class="dot" style="background:#c62828"></span>خارج</span></div>`;
  }
  document.getElementById('standingsView').innerHTML=html;
}

function renderMatches(){
  const g=G[activeGroup];
  let html='<div class="matches-list">';
  g.matches.forEach((m,mi)=>{
    const s=scores[activeGroup][mi];
    const t1n=g.teams[m.t1],t2n=g.teams[m.t2];
    if(s.s1!==null&&s.s2!==null){
      html+=`<div class="match-played"><div class="team-label">${t1n}</div><div class="score-box-done"><div class="score-num">${s.s1} - ${s.s2}</div></div><div class="team-label left">${t2n}</div></div>`;
    } else {
      html+=`<div class="match-upcoming">
        <div class="match-upcoming-row">
          <div class="team-label">${t1n}</div>
          <div class="upcoming-score">
            <input class="score-input" type="number" min="0" max="30" id="gs1_${activeGroup}_${mi}" placeholder="0">
            <span class="score-dash">-</span>
            <input class="score-input" type="number" min="0" max="30" id="gs2_${activeGroup}_${mi}" placeholder="0">
          </div>
          <div class="team-label left">${t2n}</div>
        </div>
        <div class="upcoming-date-label">📅 ${m.d}</div>
        <button class="confirm-btn" onclick="confirmGroupScore(${activeGroup},${mi})">✅ تأكيد وحفظ</button>
      </div>`;
    }
  });
  html+='</div>';
  document.getElementById('matchesView').innerHTML=html;
}

function confirmGroupScore(gi,mi){
  const v1=document.getElementById(`gs1_${gi}_${mi}`).value;
  const v2=document.getElementById(`gs2_${gi}_${mi}`).value;
  if(v1===''||v2===''){showToast('⚠️ أدخل النتيجة أولاً','#ff6d00');return;}
  scores[gi][mi].s1=parseInt(v1);
  scores[gi][mi].s2=parseInt(v2);
  saveData();
  showToast('✅ تم الحفظ — دور الـ32 يتحدث تلقائياً! 🔄','#00c853');
  renderGroupContent();
  // إذا كانت صفحة دور الـ32 مفتوحة، حدّثها أيضاً
  if(activePage==='knockout') renderKnockout();
}

function renderGroupContent(){
  renderButtons();
  document.getElementById('groupTitle').textContent='المجموعة '+G[activeGroup].name;
  renderStandings();
  renderMatches();
  switchTab(activeTab);
}

function switchTab(tab){
  activeTab=tab;
  document.querySelectorAll('.tab-btn').forEach((b,i)=>{
    b.className='tab-btn'+((i===0&&tab==='standings')||(i===1&&tab==='matches')?' active':'');
  });
  document.getElementById('standingsView').className=tab==='standings'?'':'hidden';
  document.getElementById('matchesView').className=tab==='matches'?'':'hidden';
}

// ============================================================
// Render دور الـ32 — ديناميكي بالكامل
// ============================================================
function renderKnockout(){
  const page=document.getElementById('knockoutPage');
  let html='';
  let lastDate='';

  KO_TEMPLATE.forEach((m,i)=>{
    // احسب اسم الفريق ديناميكياً من الترتيب الحالي
    const team1=resolveTeam(m.t1);
    const team2=resolveTeam(m.t2);
    const t1name = team1 ? team1.name : '?';
    const t1sub  = team1 ? team1.sub  : `مرتقب (${G[m.t1.gi].name})`;
    const t2name = team2 ? team2.name : '?';
    const t2sub  = team2 ? team2.sub  : `مرتقب (${G[m.t2.gi].name})`;
    const tbd    = !team1 || !team2;

    if(m.date!==lastDate){
      lastDate=m.date;
      html+=`<div class="ko-day-title">📅 ${m.date}</div>`;
    }

    const s=koScores[i];
    const played=s.s1!==null&&s.s2!==null;
    let winnerName='';
    if(played){
      const s1=+s.s1,s2=+s.s2;
      if(s1>s2) winnerName=t1name;
      else if(s2>s1) winnerName=t2name;
      else winnerName='تعادل (يكمل بأوقات إضافية)';
    }

    html+=`<div class="ko-match">
      <div class="ko-header">
        <span style="color:#556688">${m.label}</span>
        ${played?`<span class="winner-tag">🏆 ${winnerName}</span>`:''}
      </div>
      <div class="ko-body">
        <div class="ko-team">
          <div class="ko-team-name ${!team1?'tbd':''}">${t1name}</div>
          <div class="ko-team-sub">${t1sub}</div>
        </div>
        <div class="ko-center">
          ${played
            ?`<div class="ko-score-done">${s.s1} - ${s.s2}</div>`
            :`<input class="ko-input" type="number" min="0" max="30" id="ko1_${i}" placeholder="0" ${tbd?'disabled':''}>
              <span class="score-dash">-</span>
              <input class="ko-input" type="number" min="0" max="30" id="ko2_${i}" placeholder="0" ${tbd?'disabled':''}>`
          }
        </div>
        <div class="ko-team" style="text-align:left">
          <div class="ko-team-name ${!team2?'tbd':''}">${t2name}</div>
          <div class="ko-team-sub">${t2sub}</div>
        </div>
      </div>
      ${!played
        ?(tbd
          ?`<div class="tbd-notice">⏳ تنتظر اكتمال نتائج المجموعات</div>`
          :`<button class="ko-confirm" onclick="confirmKO(${i})">✅ تأكيد النتيجة وحفظها</button>`
        ):''
      }
    </div>`;
  });

  page.innerHTML=html;
}

function confirmKO(i){
  const v1=document.getElementById(`ko1_${i}`).value;
  const v2=document.getElementById(`ko2_${i}`).value;
  if(v1===''||v2===''){showToast('⚠️ أدخل النتيجة أولاً','#ff6d00');return;}
  koScores[i]={s1:parseInt(v1),s2:parseInt(v2)};
  saveData();
  showToast('✅ تم الحفظ!','#00c853');
  renderKnockout();
}

// ============================================================
// التنقل
// ============================================================
function switchPage(page){
  activePage=page;
  document.querySelectorAll('.nav-btn').forEach((b,i)=>{
    b.className='nav-btn'+((i===0&&page==='groups')||(i===1&&page==='knockout')?' active':'');
  });
  document.getElementById('groupsPage').className=page==='groups'?'':'hidden';
  document.getElementById('knockoutPage').className=page==='knockout'?'ko-section':'hidden';
  if(page==='knockout') renderKnockout();
}

function resetAll(){
  if(!confirm('مسح جميع النتائج المدخلة يدوياً؟\nستعود البيانات الرسمية فقط.')) return;
  scores=G.map(g=>g.matches.map(m=>({s1:m.s1,s2:m.s2})));
  koScores=KO_TEMPLATE.map(()=>({s1:null,s2:null}));
  localStorage.removeItem(STORAGE_KEY);
  showToast('🗑️ تم المسح','#ff6d00');
  renderGroupContent();
  if(activePage==='knockout') renderKnockout();
}

function showToast(msg,color='#00c853'){
  const t=document.getElementById('toast');
  t.textContent=msg; t.style.background=color;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2800);
}

// ============================================================
// تشغيل
// ============================================================
const data=initData();
scores=data.scores;
koScores=data.koScores;
renderGroupContent();
</script>
</body>
</html>
